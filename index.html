<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>מחולל השמות Y2K ✨</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="theme-layer-a" class="theme-layer" aria-hidden="true"></div>
    <div id="theme-layer-b" class="theme-layer" aria-hidden="true"></div>
    <div id="sparkle-layer" class="sparkle-layer" aria-hidden="true"></div>
    <div id="rainbow-cursor" class="rainbow-cursor" aria-hidden="true"></div>

    <button id="theme-toggle" class="theme-toggle" type="button" aria-pressed="false">
      <span class="theme-toggle-dot" aria-hidden="true"></span>
      רקע לפי שם
    </button>

    <main class="stage" aria-label="Hebrew name generator">
      <section class="generator" aria-live="polite">
        <h1 id="generated-name" class="name">זוהריה</h1>
        <div class="button-row">
          <button id="generate-button" class="generate-button" type="button">
            עוד שם!!
          </button>
          <button id="save-button" class="save-button" type="button">
            💾 שמירה
          </button>
        </div>
        <p id="vibe-tag" class="vibe-tag" hidden></p>
      </section>
    </main>

    <script src="names-engine.js"></script>
    <script src="script.js"></script>
  </body>
</html>
